---
# Include in pre_tasks of any play targeting Tailscale hosts:
#   pre_tasks:
#     - ansible.builtin.include_tasks: tailscale_check.yml

- name: Check Tailscale status
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false
  delegate_to: localhost
  run_once: true

- name: Fail if Tailscale CLI is not installed
  ansible.builtin.fail:
    msg: >-
      Tailscale CLI not found. Install it first:
      https://tailscale.com/download
  when: tailscale_status.rc == 2
  delegate_to: localhost
  run_once: true

- name: Fail if Tailscale is not connected
  ansible.builtin.fail:
    msg: >-
      Tailscale is not running or not authenticated.
      Run 'tailscale up' or 'sudo tailscale login' to connect.
  when: tailscale_status.rc != 0
  delegate_to: localhost
  run_once: true
