- name: Install prowlarr
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.prowlarr
    apply:
      become: true
      tags: prowlarr
  vars:
    prowlarr_pid: "999"
    prowlarr_gid: "10"
    prowlarr_memory: "1g"
    prowlarr_memory_swap: "1g"

- name: Install flaresolverr
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.flaresolverr
    apply:
      become: true
      tags: flaresolverr
  vars:
    flare_port: 8191

- name: Create slskd config folder
  tags: slskd
  become: true
  ansible.builtin.file:
    path: /etc/slskd
    state: directory
    owner: 999
    group: 10
    mode: '0755'

- name: Install slskd
  tags: slskd
  community.docker.docker_container:
    name: slskd
    image: slskd/slskd:latest
    pull: true
    volumes:
      - /volume1/storage/music:/music:rw
      - /volume1/storage/downloads/complete/music:/downloads:rw
      - /volume1/storage/downloads/incomplete:/incomplete:rw
      - /etc/slskd:/app
    env:
      PUID: "999"
      PGID: "10"
    user: "999:10"
    ports:
      - "5030:5030"
      - "5031:5031"
      - "50300:50300"
    restart_policy: unless-stopped
    memory: 1g

- name: Create soularr config folder
  tags: soularr
  become: true
  ansible.builtin.file:
    path: /etc/soularr
    state: directory
    owner: 999
    group: 10
    mode: '0755'

- name: Install sourlarr
  tags: soularr
  community.docker.docker_container:
    name: soularr
    image: mrusse08/soularr:latest
    user: "999:10"
    pull: true
    volumes:
      - /volume1/storage/downloads/complete/music:/downloads:rw
      - /etc/soularr:/data
    restart_policy: unless-stopped
    memory: 1g

- name: Deploy lidarr
  tags: lidarr
  become: true
  community.docker.docker_container:
    name: lidarr
    image: ghcr.io/hotio/lidarr:pr-plugins
    pull: true
    ports:
      - "8686:8686"
    volumes:
      - "/volume1/storage/music:/music:rw"
      - "/volume1/storage/downloads:/downloads:rw"
      - "/volume1/storage/downloads:/data:rw"
      - "/etc/lidarr:/config:rw"
    env:
      TZ: "America/Los_Angeles"
      PUID: "999"
      PGID: "10"
    restart_policy: unless-stopped
    memory: "1g"
    memory_swap: "1g"
