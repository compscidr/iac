---
- name: Create media folders
  tags: plex, transmission, sabnzbd, sonarr, radarr, lidarr
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '755'
    owner: jason
    group: admin
  loop:
    - /volume1/storage/
    - /volume1/storage/downloads
    - /volume1/storage/downloads/complete
    - /volume1/storage/tv
    - /volume1/storage/movies
    - /volume1/storage/music

- name: Create Transmission Directories
  tags: transmission
  become: true
  ansible.builtin.file:
    path: "/etc/transmission/"
    state: directory
    mode: '755'
    owner: jason
    group: admin

- name: Set transmission nordvpn credentials
  tags: transmission
  become: true
  ansible.builtin.copy:
    mode: '755'
    owner: jason
    group: admin
    dest: "/etc/transmission/.env"
    content: |
      TRANSMISSION_WEB_UI=transmission-web-control
      OPENVPN_PROVIDER=NORDVPN
      NORDVPN_PROTOCOL=udp
      OPENVPN_USERNAME={{ lookup('community.general.onepassword', 'NordVPN Manual', field='username', vault='Infrastructure', account_id='CZG3A4373RA2FC5W5JKFUMYILI') }}
      OPENVPN_PASSWORD={{ lookup('community.general.onepassword', 'NordVPN Manual', field='credential', vault='Infrastructure', account_id='CZG3A4373RA2FC5W5JKFUMYILI') }}
      NORDVPN_COUNTRY:=US
      NORDVPN_CATEGORY=P2P
      LOCAL_NETWORK=192.168.0.0/24
      HEALTH_CHECK_HOST=8.8.8.8

- name: Install transmission
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.transmission
    apply:
      become: true
      tags: transmission
  vars:
    transmission_folder: /etc/transmission
    transmission_downloads_folder: /volume1/storage/downloads
    transmission_pid: "999"
    transmission_gid: "10"
    transmission_memory: "5g"
    transmission_memory_swap: "5g"

- name: Install plex
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.plex
    apply:
      become: true
      tags: plex
  vars:
    plex_dri_devices: true
    plex_bonjour_port: 5354
    plex_tv_folder: /volume1/storage/tv
    plex_movies_folder: /volume1/storage/movies
    plex_music_folder: /volume1/storage/music
    plex_claim: claim-haziyvUxG2Fb4uj5-tF1
    plex_pid: "999"
    plex_gid: "10"
    plex_memory: "5g"
    plex_memory_swap: "5g"

- name: Install sabnzbd
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.sabnzbd
    apply:
      become: true
      tags: sabnzbd
  vars:
    sabnzbd_pid: "999"
    sabnzbd_gid: "10"
    sabnzbd_download_folder: /volume1/storage/downloads
    sabnzbd_memory: "5g"
    sabnzbd_memory_swap: "5g"

- name: Install sonarr
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.sonarr
    apply:
      become: true
      tags: sonarr
  vars:
    sonarr_folder: /etc/sonarr
    sonarr_tv_folder: /volume1/storage/tv
    sonarr_transmissions_downloads_folder: /volume1/storage/downloads
    sonarr_sabnzbd_downloads_folder: /volume1/storage/downloads
    sonarr_pid: "999"
    sonarr_gid: "10"
    sonarr_memory: "1g"
    sonarr_memory_swap: "1g"

- name: Install radarr
  tags: always
  ansible.builtin.include_role:
    name: compscidr.media_server.radarr
    apply:
      become: true
      tags: radarr
  vars:
    radarr_movies_folder: /volume1/storage/movies
    radarr_transmission_downloads_folder: /volume1/storage/downloads
    radarr_sabnzbd_downloads_folder: /volume1/storage/downloads
    radarr_pid: "999"
    radarr_gid: "10"
    radarr_memory: "1g"
    radarr_memory_swap: "1g"

