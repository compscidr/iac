---
- name: Check if vscode apt repo exists
  tags: vscode
  become: true
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/vscode.sources
  register: vscode_repo_exists

- name: Install vscode apt repo
  tags: vscode
  become: true
  ansible.builtin.deb822_repository:
    name: vscode
    types: [deb]
    uris: https://packages.microsoft.com/repos/code
    signed_by: https://packages.microsoft.com/keys/microsoft.asc
    suites: [stable]
    components: [main]
    state: present
    enabled: true
  when: not vscode_repo_exists.stat.exists

- name: Install vscode
  become: true
  tags: vscode
  ansible.builtin.apt:
    update_cache: true
    pkg:
      - code

- name: Install jetbrains toolbox
  tags: jetbrains
  ansible.builtin.include_role:
    name: webarchitect609.jet_brains_toolbox
    apply:
      become: true

- name: Ensure group wireshark exists
  become: true
  tags: wireshark
  ansible.builtin.group:
    name: wireshark
    state: present

- name: Add user to group wireshark
  become: true
  tags: wireshark
  ansible.builtin.user:
    name: "{{ username }}"
    groups: wireshark
    append: true

- name: Install wireshark
  tags: wireshark
  become: true
  ansible.builtin.apt:
    pkg:
      - wireshark

- name: Postman
  tags: postman
  become: true
  ansible.builtin.unarchive:
    src: https://dl.pstmn.io/download/latest/linux64
    dest: /opt/
    remote_src: true

- name: Postman app shortcut
  tags: postman
  become: true
  ansible.builtin.copy:
    src: files/postman.desktop
    dest: /usr/share/applications/postman.desktop
    mode: '0664'

- name: Dconf-Editor
  tags: dconf
  become: true
  ansible.builtin.apt:
    pkg:
      - dconf-editor

- name: Virtualbox
  tags: virtualbox
  become: true
  ansible.builtin.apt:
    pkg:
      - virtualbox

- name: Lapce
  ansible.builtin.include_role:
    name: compscidr.lapce
    apply:
      tags: lapce
      become: true
  # https://github.com/ansible/ansible/issues/52063#issuecomment-509142583
  tags: lapce

- name: Spotify
  ansible.builtin.include_role:
    name: compscidr.spotify.spotify
    apply:
      tags: spotify
      become: true
  tags: spotify

# Claude Desktop — installed from a pinned `.deb` on aaddrick's GitHub
# Releases. See roles/dev_gui/defaults/main.yml for the pin + context.
# We deliberately avoid aaddrick's apt channel (their Release file has
# been intermittently broken) and fetch the .deb asset directly.
- name: Remove legacy aaddrick claude-desktop apt source
  tags: claude-desktop
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/claude-desktop.sources
    state: absent
  register: claude_desktop_legacy_source

- name: Refresh apt cache after removing legacy claude-desktop source
  tags: claude-desktop
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: claude_desktop_legacy_source.changed

- name: Derive claude-desktop .deb filename version (upstream-aaddrick)
  tags: claude-desktop
  ansible.builtin.set_fact:
    _claude_desktop_filename_version: "{{ claude_desktop_tag | regex_replace('^v(.+)\\+claude(.+)$', '\\2-\\1') }}"
    _claude_desktop_deb_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

- name: Query currently installed claude-desktop version
  tags: claude-desktop
  ansible.builtin.command: dpkg-query -f '${Version}' -W claude-desktop
  register: claude_desktop_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: Download pinned claude-desktop .deb
  tags: claude-desktop
  ansible.builtin.get_url:
    url: "https://github.com/aaddrick/claude-desktop-debian/releases/download/{{ claude_desktop_tag }}/claude-desktop_{{ _claude_desktop_filename_version }}_{{ _claude_desktop_deb_arch }}.deb"
    dest: "/tmp/claude-desktop_{{ _claude_desktop_filename_version }}_{{ _claude_desktop_deb_arch }}.deb"
    mode: "0644"
  when: claude_desktop_installed.stdout != _claude_desktop_filename_version

- name: Install claude-desktop from pinned .deb
  tags: claude-desktop
  become: true
  ansible.builtin.apt:
    deb: "/tmp/claude-desktop_{{ _claude_desktop_filename_version }}_{{ _claude_desktop_deb_arch }}.deb"
  when: claude_desktop_installed.stdout != _claude_desktop_filename_version
