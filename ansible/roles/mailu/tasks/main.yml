---
# Mailu mail server deployment (consolidated on www with nginx-proxy)

- name: Create Mailu directory
  become: true
  ansible.builtin.file:
    path: "{{ mailu_install_path }}"
    state: directory
    mode: '755'

- name: Create Mailu data directories
  become: true
  ansible.builtin.file:
    path: "{{ mailu_install_path }}/{{ item }}"
    state: directory
    mode: '755'
  loop:
    - data
    - dkim
    - mail
    - overrides
    - overrides/nginx
    - overrides/dovecot
    - overrides/postfix
    - overrides/rspamd
    - overrides/roundcube
    - redis
    - webmail
    - filter
    - mailqueue

- name: Deploy mailu.env
  become: true
  ansible.builtin.template:
    src: mailu.env.j2
    dest: "{{ mailu_install_path }}/mailu.env"
    mode: '600'
  notify: Restart Mailu

- name: Deploy docker-compose.yml
  become: true
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mailu_install_path }}/docker-compose.yml"
    mode: '644'
  notify: Restart Mailu

# nginx-proxy stores certs as <domain>.crt/<domain>.key
# Mailu expects cert.pem/key.pem - create symlinks
- name: Create cert.pem symlink for Mailu
  become: true
  ansible.builtin.file:
    src: "{{ mailu_hostname }}.crt"
    dest: /var/lib/docker/volumes/certs/_data/cert.pem
    state: link
    force: true

- name: Create key.pem symlink for Mailu
  become: true
  ansible.builtin.file:
    src: "{{ mailu_hostname }}.key"
    dest: /var/lib/docker/volumes/certs/_data/key.pem
    state: link
    force: true

- name: Start Mailu stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ mailu_install_path }}"
    state: present
    pull: always

- name: Wait for Mailu to be ready
  become: true
  ansible.builtin.wait_for:
    port: 443  # nginx-proxy handles HTTPS
    delay: 10
    timeout: 120

- name: Create admin user
  become: true
  ansible.builtin.command:
    cmd: >
      docker compose exec -T admin flask mailu admin
      {{ mailu_admin_user }} {{ mailu_domain }} {{ mailu_admin_password }}
  args:
    chdir: "{{ mailu_install_path }}"
  register: admin_result
  changed_when: "'created' in admin_result.stdout"
  failed_when: false  # May fail if user exists
  no_log: true  # Hide admin password

- name: Create mail users
  become: true
  ansible.builtin.command:
    cmd: >
      docker compose exec -T admin flask mailu user
      {{ item.user }} {{ mailu_domain }} {{ item.password }}
  args:
    chdir: "{{ mailu_install_path }}"
  loop: "{{ mailu_users }}"
  register: user_result
  changed_when: false  # Can't reliably detect from looped command
  failed_when: false  # May fail if user exists
  no_log: true  # Hide passwords

- name: Import additional domains via config-import
  become: true
  ansible.builtin.shell:
    cmd: |
      echo 'domain:
        - name: {{ item.domain }}
          dkim_key: -generate-
      ' | docker compose exec -T admin flask mailu config-import --update
  args:
    chdir: "{{ mailu_install_path }}"
  loop: "{{ mailu_additional_domains | default([]) }}"
  register: domain_result
  changed_when: "'updated' in domain_result.stdout | default('')"
  failed_when: false

- name: Create additional domain users
  become: true
  ansible.builtin.command:
    cmd: >
      docker compose exec -T admin flask mailu user
      {{ item.1.user }} {{ item.0.domain }} {{ item.1.password }}
  args:
    chdir: "{{ mailu_install_path }}"
  loop: "{{ mailu_additional_domains | default([]) | subelements('users') }}"
  register: user_result
  changed_when: false
  failed_when: false  # May fail if user exists
  no_log: true  # Hide passwords

- name: Get DKIM public key
  become: true
  ansible.builtin.command:
    cmd: cat "{{ mailu_install_path }}/dkim/{{ mailu_domain }}.dkim.key"
  register: dkim_key
  changed_when: false
  failed_when: false

- name: Display DKIM key for DNS
  ansible.builtin.debug:
    msg: |
      Add this DKIM record to DNS:
      Name: dkim._domainkey.{{ mailu_domain }}
      Type: TXT
      Value: {{ dkim_key.stdout | default('DKIM key not yet generated - restart admin container') }}
  when: dkim_key.stdout is defined and dkim_key.stdout | length > 0

- name: Get DKIM public keys for additional domains
  become: true
  ansible.builtin.command:
    cmd: cat "{{ mailu_install_path }}/dkim/{{ item.domain }}.dkim.key"
  loop: "{{ mailu_additional_domains | default([]) }}"
  register: additional_dkim_keys
  changed_when: false
  failed_when: false

- name: Display DKIM keys for additional domains
  ansible.builtin.debug:
    msg: |
      Add this DKIM record to DNS:
      Name: dkim._domainkey.{{ item.item.domain }}
      Type: TXT
      Value: {{ item.stdout | default('DKIM key not yet generated - add domain in admin UI and restart') }}
  loop: "{{ additional_dkim_keys.results | default([]) }}"
  when: item.stdout is defined and item.stdout | length > 0
