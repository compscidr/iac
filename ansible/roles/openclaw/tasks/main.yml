---
# Openclaw installation and configuration
#
# The openclaw CLI installs and manages its own user-level systemd unit
# (~/.config/systemd/user/openclaw-gateway.service) during first-run
# setup via `openclaw gateway`. This role bootstraps: claude binary
# install, Claude Code credential restore, npm install of openclaw,
# workspace clone, Tailscale Serve. On a fresh host the user still
# needs to run the openclaw wizard once after this role completes so
# the gateway unit is created and enabled.

# Cleanup: remove the legacy system-level clawdbot.service left behind
# by older versions of this role. The tool now installs its own
# user-level unit; an orphan system-level unit would sit disabled/failed
# on previously-configured hosts and could confuse operators.
- name: Stat legacy clawdbot systemd unit
  become: true
  ansible.builtin.stat:
    path: /etc/systemd/system/clawdbot.service
  register: legacy_clawdbot_service
  tags:
    - openclaw
    - cleanup

- name: Stop and disable legacy clawdbot systemd unit
  become: true
  ansible.builtin.systemd:
    name: clawdbot.service
    enabled: false
    state: stopped
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

- name: Remove legacy clawdbot systemd unit file
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/clawdbot.service
    state: absent
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

- name: Reload systemd after removing legacy clawdbot unit
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

# Install the `claude` binary via Anthropic's native installer.
# Openclaw shells out to this binary for Claude-backed model calls;
# without it the provider wiring fails. The installer drops a single
# ELF at ~/.local/share/claude/versions/<ver> and symlinks
# ~/.local/bin/claude. `creates:` makes this idempotent — upgrades are
# handled by `claude update` on the host, not by re-running the script.
- name: Install claude binary via upstream installer
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: "/home/{{ openclaw_user }}/.local/bin/claude"
    executable: /bin/bash
  tags:
    - openclaw
    - install
    - claude

# Ensure ~/.claude exists before dropping the credentials file into it.
# Claude Code creates this dir itself on first run, but on a fresh host
# we write the credentials *before* the binary has ever been invoked.
- name: Ensure ~/.claude directory exists
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.file:
    path: "/home/{{ openclaw_user }}/.claude"
    state: directory
    mode: "0755"
  when: openclaw_claude_credentials | length > 0
  tags:
    - openclaw
    - claude
    - credentials

# Restore the Claude Code OAuth blob captured from a prior `claude login`
# web flow on this host. `force: no` means this creates the file on a
# fresh host but never overwrites a file already on disk — Claude Code
# refreshes tokens in-place, and a stale vault snapshot must not clobber
# a fresh on-host token. Keeping the vault in sync is the operator's job
# (see the R-1 pre-destroy sync ritual in ansible/openclaw.yml).
- name: Restore Claude Code credentials
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.copy:
    content: "{{ openclaw_claude_credentials }}"
    dest: "/home/{{ openclaw_user }}/.claude/.credentials.json"
    mode: "0600"
    force: false
  when: openclaw_claude_credentials | length > 0
  no_log: true
  tags:
    - openclaw
    - claude
    - credentials

# Install openclaw globally via npm
- name: Install openclaw via npm
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    export PATH="/home/{{ openclaw_user }}/.local/share/fnm:$PATH"
    eval "$(fnm env)"
    npm install -g {{ openclaw_npm_package }}{% if openclaw_version | length > 0 %}@{{ openclaw_version }}{% endif %}

  register: npm_install
  changed_when: "'added' in npm_install.stdout or 'up to date' not in npm_install.stdout"
  tags:
    - openclaw
    - install

# Clone workspace repository
- name: Clone workspace repository
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.git:
    repo: "{{ openclaw_workspace_repo }}"
    dest: "{{ openclaw_workspace_path }}"
    version: main
    accept_hostkey: true
  when: openclaw_workspace_repo | length > 0
  tags:
    - openclaw
    - workspace

# Create config directory
# Path kept as ~/.clawdbot for on-disk backward compatibility. Filename
# migrated to openclaw.json. The directory accumulates bot state
# (agents/, memory/, identity/, canvas/, credentials/, etc.) managed by
# the openclaw runtime — not by Ansible.
- name: Create openclaw config directory
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    mode: "0700"
  tags:
    - openclaw
    - config

# The systemd unit is created by the openclaw tool itself during
# `openclaw gateway` first-run setup. Ansible does not manage
# /etc/systemd/system/openclaw*.service or the user-level
# ~/.config/systemd/user/openclaw-gateway.service — the tool owns them,
# including the embedded gateway token env var.

# Configure Tailscale Serve for HTTPS + auth
- name: Configure Tailscale Serve
  become: true
  ansible.builtin.shell: |
    tailscale serve --bg --https=443 http://localhost:{{ openclaw_port }}
  when: openclaw_tailscale_serve
  changed_when: false
  tags:
    - openclaw
    - tailscale
    - molecule-notest
