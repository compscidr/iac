---
# Openclaw installation and configuration
#
# The openclaw CLI installs and manages its own user-level systemd unit
# (~/.config/systemd/user/openclaw-gateway.service) during first-run
# setup via `openclaw gateway`. This role only bootstraps: npm install,
# workspace clone, Tailscale Serve. On a fresh host the user still needs
# to run the openclaw wizard once after this role completes so the
# gateway unit is created and enabled.

# Cleanup: remove the legacy system-level clawdbot.service left behind
# by older versions of this role. The tool now installs its own
# user-level unit; an orphan system-level unit would sit disabled/failed
# on previously-configured hosts and could confuse operators.
- name: Stat legacy clawdbot systemd unit
  become: true
  ansible.builtin.stat:
    path: /etc/systemd/system/clawdbot.service
  register: legacy_clawdbot_service
  tags:
    - openclaw
    - cleanup

- name: Stop and disable legacy clawdbot systemd unit
  become: true
  ansible.builtin.systemd:
    name: clawdbot.service
    enabled: false
    state: stopped
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

- name: Remove legacy clawdbot systemd unit file
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/clawdbot.service
    state: absent
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

- name: Reload systemd after removing legacy clawdbot unit
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when: legacy_clawdbot_service.stat.exists
  tags:
    - openclaw
    - cleanup

# Install openclaw globally via npm
- name: Install openclaw via npm
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    export PATH="/home/{{ openclaw_user }}/.local/share/fnm:$PATH"
    eval "$(fnm env)"
    npm install -g {{ openclaw_npm_package }}{% if openclaw_version | length > 0 %}@{{ openclaw_version }}{% endif %}

  register: npm_install
  changed_when: "'added' in npm_install.stdout or 'up to date' not in npm_install.stdout"
  tags:
    - openclaw
    - install

# Clone workspace repository
- name: Clone workspace repository
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.git:
    repo: "{{ openclaw_workspace_repo }}"
    dest: "{{ openclaw_workspace_path }}"
    version: main
    accept_hostkey: true
  when: openclaw_workspace_repo | length > 0
  tags:
    - openclaw
    - workspace

# Create config directory
# Path kept as ~/.clawdbot for on-disk backward compatibility. Filename
# migrated to openclaw.json. The directory accumulates bot state
# (agents/, memory/, identity/, canvas/, credentials/, etc.) managed by
# the openclaw runtime — not by Ansible.
- name: Create openclaw config directory
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    mode: "0700"
  tags:
    - openclaw
    - config

# The systemd unit is created by the openclaw tool itself during
# `openclaw gateway` first-run setup. Ansible does not manage
# /etc/systemd/system/openclaw*.service or the user-level
# ~/.config/systemd/user/openclaw-gateway.service — the tool owns them,
# including the embedded gateway token env var.

# Configure Tailscale Serve for HTTPS + auth
- name: Configure Tailscale Serve
  become: true
  ansible.builtin.shell: |
    tailscale serve --bg --https=443 http://localhost:{{ openclaw_port }}
  when: openclaw_tailscale_serve
  changed_when: false
  tags:
    - openclaw
    - tailscale
    - molecule-notest
