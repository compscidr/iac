---
# Openclaw installation and configuration
#
# The openclaw CLI installs and manages its own user-level systemd unit
# (~/.config/systemd/user/openclaw-gateway.service) during first-run
# setup via `openclaw gateway`. This role only bootstraps: npm install,
# workspace clone, op.env deploy, Tailscale Serve. On a fresh host the
# user still needs to run the openclaw wizard once after this role
# completes so the gateway unit is created and enabled.

# Check current openclaw version
- name: Check current openclaw version
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    export PATH="/home/{{ openclaw_user }}/.local/share/fnm:$PATH"
    eval "$(fnm env)"
    openclaw --version 2>/dev/null || echo "not installed"
  register: openclaw_current_version
  changed_when: false
  tags:
    - openclaw
    - install

# Install openclaw globally via npm
- name: Install openclaw via npm
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.shell: |
    export PATH="/home/{{ openclaw_user }}/.local/share/fnm:$PATH"
    eval "$(fnm env)"
    npm install -g {{ openclaw_npm_package }}{% if openclaw_version | length > 0 %}@{{ openclaw_version }}{% endif %}

  register: npm_install
  changed_when: "'added' in npm_install.stdout or 'up to date' not in npm_install.stdout"
  tags:
    - openclaw
    - install

# Clone workspace repository
- name: Clone workspace repository
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.git:
    repo: "{{ openclaw_workspace_repo }}"
    dest: "{{ openclaw_workspace_path }}"
    version: main
    accept_hostkey: true
  when: openclaw_workspace_repo | length > 0
  tags:
    - openclaw
    - workspace

# Create config directory
# Path kept as ~/.clawdbot for on-disk backward compatibility. Filename
# migrated to openclaw.json. The directory accumulates bot state
# (agents/, memory/, identity/, canvas/, credentials/, etc.) managed by
# the openclaw runtime — not by Ansible.
- name: Create openclaw config directory
  become: true
  become_user: "{{ openclaw_user }}"
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    mode: "0700"
  tags:
    - openclaw
    - config

# Create directory for environment file
- name: Create openclaw etc directory
  become: true
  ansible.builtin.file:
    path: /etc/clawdbot
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags:
    - openclaw
    - config

# Deploy 1Password service account token (root-only for security)
# NOTE: the currently-running openclaw-gateway.service user-level unit
# does not reference this file via EnvironmentFile. Kept in case the
# openclaw runtime reads it directly, or for a future user-level unit
# override.conf that sources it.
- name: Deploy 1Password environment file
  become: true
  ansible.builtin.copy:
    content: |
      # 1Password service account token for openclaw
      # Managed by Ansible - do not edit
      OP_SERVICE_ACCOUNT_TOKEN={{ openclaw_op_service_account_token }}
    dest: /etc/clawdbot/op.env
    owner: root
    group: root
    mode: "0600"
  when: openclaw_op_service_account_token | length > 0
  no_log: true  # Don't log the token
  tags:
    - openclaw
    - config

# The systemd unit is created by the openclaw tool itself during
# `openclaw gateway` first-run setup. Ansible does not manage
# /etc/systemd/system/openclaw*.service or the user-level
# ~/.config/systemd/user/openclaw-gateway.service — the tool owns them,
# including the embedded gateway token env var.

# Configure Tailscale Serve for HTTPS + auth
- name: Configure Tailscale Serve
  become: true
  ansible.builtin.shell: |
    tailscale serve --bg --https=443 http://localhost:{{ openclaw_port }}
  when: openclaw_tailscale_serve
  changed_when: false
  tags:
    - openclaw
    - tailscale
    - molecule-notest
