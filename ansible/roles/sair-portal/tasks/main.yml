---
# Deploy SAIR portal on the projects droplet
# Landing page + magic-link auth/dashboard at sair.run

- name: Log in to GHCR
  become: true
  community.docker.docker_login:
    registry: ghcr.io
    username: "{{ sair_portal_ghcr_user }}"
    password: "{{ sair_portal_ghcr_token }}"
  when: sair_portal_ghcr_token | length > 0
  no_log: true

- name: Create portal data directory
  become: true
  ansible.builtin.file:
    path: "{{ sair_portal_data_dir }}"
    state: directory
    owner: "10001"
    group: "10001"
    mode: "0755"

- name: Deploy SAIR portal
  become: true
  community.docker.docker_container:
    name: sair-portal
    image: "{{ sair_portal_image }}"
    pull: true
    restart_policy: unless-stopped
    networks:
      - name: nginx-proxy
    mounts:
      - source: "{{ sair_portal_data_dir }}"
        target: /app/data
        type: bind
    env:
      PORTAL_PORT: "{{ sair_portal_port | string }}"
      PORTAL_BASE_URL: "https://{{ sair_portal_domain }}"
      PORTAL_DB_PATH: "/app/data/portal.db"
      SMTP_HOST: "{{ sair_portal_smtp_host }}"
      SMTP_PORT: "{{ sair_portal_smtp_port }}"
      SMTP_USERNAME: "{{ sair_portal_smtp_username }}"
      SMTP_PASSWORD: "{{ sair_portal_smtp_password }}"
      SMTP_FROM: "{{ sair_portal_smtp_from }}"
      VIRTUAL_HOST: "{{ sair_portal_domain }},www.{{ sair_portal_domain }}"
      VIRTUAL_PORT: "{{ sair_portal_port | string }}"
      LETSENCRYPT_HOST: "{{ sair_portal_domain }},www.{{ sair_portal_domain }}"
      LETSENCRYPT_EMAIL: "{{ sair_portal_letsencrypt_email }}"
