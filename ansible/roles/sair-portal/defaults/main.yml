---
# SAIR portal role defaults

sair_portal_image: "ghcr.io/compscidr/sair-portal:latest"
sair_portal_port: 8080
sair_portal_domain: "sair.run"
sair_portal_letsencrypt_email: "ernstjason1@gmail.com"
sair_portal_ghcr_token: ""
sair_portal_ghcr_user: "compscidr"

# SMTP for magic link auth
sair_portal_smtp_host: "mail.sair.run"
sair_portal_smtp_port: 465
sair_portal_smtp_username: ""
sair_portal_smtp_password: ""
sair_portal_smtp_from: ""

# Stripe billing
sair_portal_stripe_secret_key: ""
sair_portal_stripe_webhook_secret: ""
sair_portal_stripe_solo_price_id: ""

# Data directory for SQLite database
sair_portal_data_dir: "/opt/sair-portal/data"
# Must match the UID/GID of the sair user in the portal container Dockerfile
sair_portal_uid: "10001"
sair_portal_gid: "10001"
