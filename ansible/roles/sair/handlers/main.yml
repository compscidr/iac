---
- name: Reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart device source
  become: true
  ansible.builtin.systemd:
    name: sair-device-source
    state: restarted

- name: Restart proxy
  become: true
  ansible.builtin.systemd:
    name: sair-proxy
    state: restarted

- name: Restart runner stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ sair_data_path }}"
    state: present
    recreate: always
    remove_orphans: true
