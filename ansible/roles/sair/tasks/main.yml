---
# SAIR deployment tasks
# - ADB server, DeviceSource, Proxy: systemd services via install script
# - GitHub Runners: Docker containers with host networking

# --- Install SAIR binaries and systemd units ---

- name: Install ADB
  become: true
  ansible.builtin.apt:
    name: adb
    state: present
    update_cache: true

- name: Download SAIR install script
  become: true
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/compscidr/sair/main/install.sh"
    dest: /tmp/sair-install.sh
    mode: "0755"

- name: Run SAIR install script with systemd
  become: true
  ansible.builtin.command:
    cmd: >
      bash /tmp/sair-install.sh
      --systemd
      {{ '--version ' ~ sair_version if sair_version | length > 0 else '' }}
  register: sair_install
  changed_when: "'Installed' in sair_install.stdout"

- name: Clean up install script
  become: true
  ansible.builtin.file:
    path: /tmp/sair-install.sh
    state: absent

# --- Configure services ---

- name: Configure device source environment
  become: true
  ansible.builtin.copy:
    dest: /etc/sair/device-source.env
    mode: "0600"
    content: |
      DEVICE_SOURCE_PORT={{ sair_device_source_port }}
      ADB_PORT={{ sair_adb_server_port }}
  notify:
    - Restart device source

- name: Configure proxy environment
  become: true
  ansible.builtin.copy:
    dest: /etc/sair/proxy.env
    mode: "0600"
    content: |
      ORCHESTRATOR_ADDR={{ sair_orchestrator_addr }}
      ORCHESTRATOR_TLS={{ sair_orchestrator_tls | lower }}
      SAIR_API_KEY={{ sair_api_key }}
      ADB_PROXY_PORT={{ sair_proxy_adb_port }}
      PROXY_HTTP_PORT={{ sair_proxy_http_port }}
      PROXY_HTTP_HOST=0.0.0.0
      SESSION_GRACE_PERIOD_MS=30000
      HEARTBEAT_INTERVAL_SECONDS=60
  notify:
    - Restart proxy
  no_log: true  # Hide API key

# --- Start services ---

- name: Enable and start SAIR services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - sair-adb-server
    - sair-device-source
    - sair-proxy

# --- Clean up old setup ---

- name: Stop and disable old DeviceSource service
  become: true
  ansible.builtin.systemd:
    name: sair-devicesource
    enabled: false
    state: stopped
  failed_when: false

- name: Remove old DeviceSource service unit
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/sair-devicesource.service
    state: absent
  notify: Reload systemd

- name: Stop and remove old Docker proxy container
  become: true
  community.docker.docker_container:
    name: sair-adb-proxy
    state: absent

# --- GitHub runners ---

- name: Log in to GHCR
  become: true
  community.docker.docker_login:
    registry: ghcr.io
    username: "{{ sair_ghcr_user }}"
    password: "{{ sair_ghcr_token }}"
  when: sair_ghcr_token | length > 0
  no_log: true

- name: Create runner data volumes
  become: true
  community.docker.docker_volume:
    name: "sair-runner-data-{{ item.name }}"
  loop: "{{ sair_runners }}"

- name: Deploy GitHub runner containers
  become: true
  community.docker.docker_container:
    name: "sair-runner-{{ item.name }}"
    image: "{{ sair_runner_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: host
    pull: true
    volumes:
      - "sair-runner-data-{{ item.name }}:/runner-data"
    env:
      ACCESS_TOKEN: "{{ sair_runner_pat }}"
      RUNNER_NAME_PREFIX: "sair-{{ item.name }}"
      LABELS: "{{ item.labels }}"
      REPO_URL: "{{ item.repo_url }}"
      DISABLE_AUTO_UPDATE: "true"
  loop: "{{ sair_runners }}"
  no_log: true  # Hide runner PAT
