---
# SAIR role defaults

# Version to install (empty = latest release)
sair_version: ""

# Orchestrator connection
sair_orchestrator_addr: "orchestrator.sair.run:9090"
sair_orchestrator_tls: true

# Ports
sair_adb_server_port: 5038
sair_device_source_port: 8080
sair_proxy_adb_port: 5037
sair_proxy_http_port: 8550

# Secrets (override in playbook via 1Password lookups)
sair_api_key: ""
sair_runner_pat: ""
sair_ghcr_token: ""
sair_ghcr_user: "compscidr"

# GitHub runner image
sair_runner_image: "compscidr/github-runner-android:latest"

# GitHub runners (list of runner containers)
sair_runners:
  - name: "sair"
    repo_url: "https://github.com/compscidr/sair"
    labels: "self-hosted,sair-enabled,linux"
